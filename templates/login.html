<!DOCTYPE html>
<html lang="{{ current_language|replace('_', '-') }}" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ _('用户登录') }} - {{ _('简易记账') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="auth-page">
    <main class="panel auth-panel">
      <div class="auth-header">
        <h1>{{ _('用户登录') }}</h1>
        <p>{{ _('简单、清晰的中日双语个人记账工具。') }}</p>
      </div>
      <div class="d-flex gap-2 mb-3">
        {% for code, label in language_options.items() %}
          <a class="btn btn-secondary btn-sm {% if current_language == code %}disabled{% endif %}" href="{{ url_for('set_language', language=code) }}">{{ label }}</a>
        {% endfor %}
      </div>

      {% if errors %}
        <div class="alert alert-error">
          {% for error in errors %}
            <p>{{ error }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" action="{{ url_for('login', next=next_url) if next_url else url_for('login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        {% if next_url %}
          <input type="hidden" name="next" value="{{ next_url }}">
        {% endif %}
        <div class="form-row">
          <label for="account">{{ _('用户名或邮箱') }}</label>
          <input
            type="text"
            id="account"
            name="account"
            value="{{ form.get('account', '') }}"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-row">
          <label for="password">{{ _('密码') }}</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">{{ _('登录') }}</button>
          <a class="btn btn-secondary auth-link" href="{{ url_for('register') }}">{{ _('还没有账号？免费注册') }}</a>
        </div>
      </form>

      <p class="auth-switch">
        <a href="{{ url_for('index') }}">{{ _('先了解 Easy Kakeibo') }}</a>
      </p>
    </main>
  </div>
</body>
</html>
