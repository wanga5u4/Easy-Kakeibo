<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}简易记账{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">简易记账</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="切换导航">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">仪表盘</a></li>
          <li class="nav-item"><a class="nav-link {% if active_page == 'records' %}active{% endif %}" href="{{ url_for('records_page') }}">记录</a></li>
          <li class="nav-item"><a class="nav-link {% if active_page == 'statistics' %}active{% endif %}" href="{{ url_for('statistics_page') }}">统计</a></li>
          <li class="nav-item"><a class="nav-link {% if active_page == 'budgets' %}active{% endif %}" href="{{ url_for('budgets_page') }}">预算</a></li>
          <li class="nav-item"><a class="nav-link {% if active_page == 'settings' %}active{% endif %}" href="{{ url_for('settings_page') }}">设置</a></li>
          <li class="nav-item"><a class="nav-link {% if active_page == 'premium' %}active{% endif %}" href="{{ url_for('premium_page') }}">Premium</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <span class="text-muted small">欢迎，{{ session.get("username") }}</span>
          <a class="btn btn-outline-danger btn-sm" href="{{ url_for('logout') }}">退出登录</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <div class="toast hidden" id="toast"></div>
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='common.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
